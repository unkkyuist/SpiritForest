<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>정령의 숲 퍼즐</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="overlay">
    <div id="screen-title" class="screen">
      <h1>✦ 정령의 숲 ✦</h1>
      <p class="subtitle">정령 매치 퍼즐</p>
      <div class="title-best">
        <span class="label">최고 점수</span>
        <span id="title-best-score">0</span>
      </div>
      <div class="menu-buttons">
        <button id="start-btn" class="menu-btn primary">시작</button>
        <button id="open-settings-btn" class="menu-btn">설정</button>
      </div>
    </div>

    <div id="screen-settings" class="screen hidden">
      <h2>설정</h2>
      <div class="setting-section">
        <h3>게임 모드</h3>
        <label class="radio-row">
          <span class="radio-main"><input type="radio" name="game-mode" value="endless">무제한</span>
          <span class="desc">제한 없이 점수를 쌓아보세요</span>
        </label>
        <label class="radio-row">
          <span class="radio-main"><input type="radio" name="game-mode" value="timeattack">타임어택</span>
          <span class="desc">제한 시간 안에 최고 점수에 도전!</span>
        </label>
        <div id="duration-row" class="sub-row hidden">
          <span>제한 시간</span>
          <select id="duration-select">
            <option value="60">60초</option>
            <option value="90">90초</option>
            <option value="120">120초</option>
          </select>
        </div>
      </div>
      <div class="setting-section">
        <h3>사운드</h3>
        <div class="sp-row">
          <label><input type="checkbox" id="sfx-on"> 효과음</label>
          <input type="range" id="sfx-vol" min="0" max="100">
        </div>
        <div class="sp-row">
          <label><input type="checkbox" id="bgm-on"> 배경음악</label>
          <input type="range" id="bgm-vol" min="0" max="100">
        </div>
        <div class="sp-row track-row">
          <button id="track-prev">◀</button>
          <span id="track-name"></span>
          <button id="track-next">▶</button>
        </div>
      </div>
      <button id="settings-back-btn" class="menu-btn">뒤로</button>
    </div>

    <div id="screen-gameover" class="screen hidden">
      <h2 id="gameover-title">⏰ 시간 종료!</h2>
      <div class="result-row">
        <span class="label">점수</span>
        <span id="final-score">0</span>
      </div>
      <div class="result-row">
        <span class="label">최고 점수</span>
        <span id="final-best">0</span>
      </div>
      <div class="menu-buttons">
        <button id="retry-btn" class="menu-btn primary">다시하기</button>
        <button id="gameover-home-btn" class="menu-btn">처음으로</button>
      </div>
    </div>
  </div>

  <header>
    <h1>✦ 정령의 숲 ✦</h1>
    <div class="score-row">
      <div class="score-box">
        <span class="label">점수</span>
        <span id="score">0</span>
      </div>
      <div class="score-box">
        <span class="label">최고 점수</span>
        <span id="best">0</span>
      </div>
      <div id="timer-box" class="score-box hidden">
        <span class="label">남은 시간</span>
        <span id="timer">60</span>
      </div>
      <button id="restart">다시 시작</button>
      <button id="home-btn">홈</button>
      <button id="sound-btn">🔊</button>
    </div>
    <div id="power-row">
      <div id="fever-wrap">
        <div id="fever-bar"></div>
        <span id="fever-label">FEVER</span>
      </div>
      <button id="ult-btn" title="필살기">
        <img src="assets/specials/rainbow.png" alt="필살기">
        <span id="ult-label">필살기</span>
      </button>
    </div>
  </header>

  <div id="board-wrap">
    <div id="board"></div>
    <div id="combo-banner"></div>
  </div>

  <img id="via" src="assets/via/idle.png" alt="비아">

  <div id="toast"></div>
  <div id="flash"></div>

  <script src="audio.js"></script>
  <script src="game.js"></script>
</body>
</html>
